<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#4a443f" />
    <!-- 仅填「站点根」如 https://askbible.me ，不要填到 /api（否则会拼成 /api/api/...） -->
    <meta name="askbible-api-base" content="" />
    <title>AskBible.me - 文章发布中心</title>
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/icons/icon-32.png" />
    <link rel="stylesheet" href="/styles.css?v=20" />
  </head>
  <body>
    <div class="page-shell">
      <header class="site-topbar">
        <div class="site-topbar-title">
          <h1>
            <span class="brand-ask">Ask</span><span class="brand-bible">Bible</span><span class="brand-me">.me</span>
          </h1>
        </div>
        <div class="site-topbar-actions">
          <a href="/notebook.html" class="site-topbar-link">文章中心</a>
          <a href="/" class="site-topbar-link">读经</a>
        </div>
      </header>

      <main class="book-layout notebook-layout article-studio-app">
        <div class="book-spread notebook-article-spread">
          <section class="book-page article-studio-page">
            <p id="articleStudioAuthBar" class="article-studio-auth-bar" hidden></p>
            <div class="article-studio-columns">
              <section class="article-studio-panel article-studio-chat-panel" aria-label="与 AI 对话">
                <h2 class="article-studio-heading">与 AI 整理观点</h2>
                <p class="article-studio-lead">
                  先说说你的想法或大纲，助手会帮你澄清、补充结构。满意后点「整理成文章草稿」，再微调标题与正文即可发布到「社区文章」栏目。
                </p>
                <div id="articleStudioChatLog" class="article-studio-chat-log" role="log" aria-live="polite"></div>
                <div class="article-studio-chat-input-row">
                  <textarea
                    id="articleStudioUserInput"
                    class="article-studio-textarea article-studio-chat-input"
                    rows="3"
                    placeholder="输入你的想法…"
                  ></textarea>
                  <button type="button" id="articleStudioSendBtn" class="primary-btn article-studio-send-btn">发送</button>
                </div>
                <div class="article-studio-chat-actions">
                  <button type="button" id="articleStudioDraftBtn" class="secondary-btn" disabled>整理成文章草稿</button>
                  <span id="articleStudioChatStatus" class="article-studio-status" role="status"></span>
                </div>
              </section>

              <section class="article-studio-panel article-studio-draft-panel" aria-label="文章草稿与发布">
                <h2 class="article-studio-heading">标题与正文</h2>
                <label class="article-studio-label" for="articleStudioTitle">标题</label>
                <input id="articleStudioTitle" class="custom-textarea single-input" type="text" maxlength="200" placeholder="文章标题" />
                <label class="article-studio-label" for="articleStudioBody">正文</label>
                <textarea
                  id="articleStudioBody"
                  class="article-studio-textarea article-studio-body"
                  rows="14"
                  placeholder="正文支持多段，可直接编辑或由上方「整理成文章草稿」生成"
                ></textarea>
                <label class="article-studio-label" for="articleStudioColumn">发布栏目</label>
                <select id="articleStudioColumn" class="article-studio-select">
                  <option value="communityArticles">社区文章</option>
                </select>
                <div class="article-studio-publish-row">
                  <button type="button" id="articleStudioPublishBtn" class="primary-btn" disabled>发布到文章中心</button>
                  <span id="articleStudioPublishStatus" class="article-studio-status" role="status"></span>
                </div>
              </section>
            </div>
          </section>
        </div>
      </main>
      <footer class="site-footer">
        <span class="site-footer-version">文章发布中心</span>
        <span class="site-footer-copy">© 2026 AskBible.me</span>
      </footer>
    </div>

    <script>
      const USER_AUTH_TOKEN_KEY = "bible_user_auth_token_v1";

      function getToken() {
        return String(localStorage.getItem(USER_AUTH_TOKEN_KEY) || "");
      }

      function authHeaders() {
        const t = getToken();
        return t ? { Authorization: `Bearer ${t}`, "Content-Type": "application/json" } : { "Content-Type": "application/json" };
      }

      /** 与 capacitor.config.ts 中 server.url 保持一致；自建站请用 meta 覆盖 */
      const DEFAULT_PRODUCTION_ORIGIN = "https://askbible.me";

      /** 只保留「协议+域名」，去掉末尾 /api，避免拼出 /api/api/... */
      function normalizeApiOrigin(raw) {
        let s = String(raw || "").trim();
        if (!s) return "";
        s = s.replace(/\/+$/, "");
        if (/\/api$/i.test(s)) s = s.replace(/\/api$/i, "");
        return s.replace(/\/+$/, "");
      }

      function getApiBase() {
        const m = document.querySelector('meta[name="askbible-api-base"]');
        const fromMeta = m && String(m.getAttribute("content") || "").trim();
        if (fromMeta) return normalizeApiOrigin(fromMeta);
        if (typeof window !== "undefined" && window.__ASKBIBLE_API_BASE__) {
          return normalizeApiOrigin(window.__ASKBIBLE_API_BASE__);
        }
        try {
          const proto = window.location.protocol || "";
          /* App 壳、本地文件包：相对 /api 会 404，必须指向线上 Node */
          if (proto === "capacitor:" || proto === "file:") {
            return DEFAULT_PRODUCTION_ORIGIN;
          }
        } catch (_) {}
        return "";
      }

      function apiUrl(path) {
        const p = path.startsWith("/") ? path : `/${path}`;
        const base = getApiBase();
        if (!base) return p;
        try {
          const origin = normalizeApiOrigin(base);
          return new URL(p, origin.endsWith("/") ? origin : `${origin}/`).href;
        } catch {
          return `${base.replace(/\/$/, "")}${p}`;
        }
      }

      /**
       * 解析 JSON；非 2xx 时抛出带可读说明的错误（含 404 部署 / API 基址提示）
       */
      async function fetchApiJson(path, init) {
        const res = await fetch(apiUrl(path), init);
        const raw = await res.text();
        let data = {};
        if (raw.trim()) {
          try {
            data = JSON.parse(raw);
          } catch {
            data = {};
          }
        }
        if (!res.ok) {
          const detail = (data && (data.error || data.message)) || "";
          const snippet = String(raw || "")
            .replace(/\s+/g, " ")
            .slice(0, 120);
          if (res.status === 404) {
            throw new Error(
              "接口返回 404（未找到）。请确认：① 服务器已部署含「文章发布中心」接口的最新 server.js；② 若从 App 或本地文件打开本页，请在 head 里设置 meta askbible-api-base 为线上站点根地址，或设置 window.__ASKBIBLE_API_BASE__。" +
                (detail ? ` 详情：${detail}` : snippet ? ` 响应片段：${snippet}` : "")
            );
          }
          throw new Error(detail || snippet || `请求失败（HTTP ${res.status}）`);
        }
        return data;
      }

      const chatLog = document.getElementById("articleStudioChatLog");
      const userInput = document.getElementById("articleStudioUserInput");
      const sendBtn = document.getElementById("articleStudioSendBtn");
      const draftBtn = document.getElementById("articleStudioDraftBtn");
      const publishBtn = document.getElementById("articleStudioPublishBtn");
      const titleEl = document.getElementById("articleStudioTitle");
      const bodyEl = document.getElementById("articleStudioBody");
      const columnEl = document.getElementById("articleStudioColumn");
      const chatStatus = document.getElementById("articleStudioChatStatus");
      const publishStatus = document.getElementById("articleStudioPublishStatus");
      const authBar = document.getElementById("articleStudioAuthBar");

      /** @type {{role:string, content:string}[]} */
      let messages = [];

      function appendBubble(role, text) {
        const wrap = document.createElement("div");
        wrap.className = "article-studio-bubble-wrap " + (role === "user" ? "is-user" : "is-assistant");
        const b = document.createElement("div");
        b.className = "article-studio-bubble";
        b.textContent = text;
        wrap.appendChild(b);
        chatLog.appendChild(wrap);
        chatLog.scrollTop = chatLog.scrollHeight;
      }

      function syncDraftButton() {
        draftBtn.disabled = messages.length === 0;
      }

      function syncPublishButton() {
        const t = String(titleEl.value || "").trim();
        const b = String(bodyEl.value || "").trim();
        publishBtn.disabled = !getToken() || t.length < 2 || b.length < 20;
      }

      titleEl.addEventListener("input", syncPublishButton);
      bodyEl.addEventListener("input", syncPublishButton);

      async function ensureAuthed() {
        const token = getToken();
        if (!token) {
          authBar.hidden = false;
          authBar.innerHTML =
            '请先 <a href="/">返回首页</a> 登录后再使用发布中心（首页右上角账户入口）。';
          sendBtn.disabled = true;
          draftBtn.disabled = true;
          publishBtn.disabled = true;
          return false;
        }
        try {
          const res = await fetch(apiUrl("/api/auth/me"), {
            headers: { Authorization: `Bearer ${token}` },
            cache: "no-store",
          });
          if (!res.ok) throw new Error();
          authBar.hidden = true;
          sendBtn.disabled = false;
          return true;
        } catch {
          authBar.hidden = false;
          authBar.innerHTML = '登录已失效，请 <a href="/">返回首页</a> 重新登录。';
          sendBtn.disabled = true;
          draftBtn.disabled = true;
          publishBtn.disabled = true;
          return false;
        }
      }

      function bubbleTextForSendError(err) {
        const msg = String(err?.message || "").trim();
        if (msg && msg.length < 600) {
          return `抱歉，无法完成回复：${msg}`;
        }
        return "抱歉，这次没有收到回复，请稍后再试。若持续失败，请检查网络或联系管理员。";
      }

      sendBtn.addEventListener("click", async () => {
        const text = String(userInput.value || "").trim();
        if (!text) return;
        if (!(await ensureAuthed())) return;
        userInput.value = "";
        messages.push({ role: "user", content: text });
        appendBubble("user", text);
        syncDraftButton();
        chatStatus.textContent = "思考中…";
        sendBtn.disabled = true;
        try {
          const data = await fetchApiJson("/api/article-studio/chat", {
            method: "POST",
            headers: authHeaders(),
            body: JSON.stringify({ messages }),
          });
          const reply = String(data.message || "").trim();
          messages.push({ role: "assistant", content: reply });
          appendBubble("assistant", reply || "（空回复）");
        } catch (e) {
          messages.pop();
          const line = bubbleTextForSendError(e);
          appendBubble("assistant", line);
        } finally {
          chatStatus.textContent = "";
          sendBtn.disabled = false;
          await ensureAuthed();
        }
      });

      draftBtn.addEventListener("click", async () => {
        if (!messages.length) return;
        if (!(await ensureAuthed())) return;
        chatStatus.textContent = "正在整理草稿…";
        draftBtn.disabled = true;
        try {
          const data = await fetchApiJson("/api/article-studio/draft", {
            method: "POST",
            headers: authHeaders(),
            body: JSON.stringify({ messages }),
          });
          titleEl.value = String(data.title || "");
          bodyEl.value = String(data.body || "");
          syncPublishButton();
          publishStatus.textContent = "已填入标题与正文，可继续修改后发布。";
        } catch (e) {
          publishStatus.textContent = e.message || "整理失败";
        } finally {
          chatStatus.textContent = "";
          draftBtn.disabled = messages.length === 0;
        }
      });

      publishBtn.addEventListener("click", async () => {
        if (!(await ensureAuthed())) return;
        const title = String(titleEl.value || "").trim();
        const body = String(bodyEl.value || "").trim();
        const columnId = String(columnEl.value || "communityArticles");
        publishStatus.textContent = "发布中…";
        publishBtn.disabled = true;
        try {
          await fetchApiJson("/api/article-studio/publish", {
            method: "POST",
            headers: authHeaders(),
            body: JSON.stringify({ title, body, columnId }),
          });
          publishStatus.textContent = "已发布。可在文章中心「社区文章」中查看。";
        } catch (e) {
          publishStatus.textContent = e.message || "发布失败";
        } finally {
          syncPublishButton();
        }
      });

      userInput.addEventListener("keydown", (ev) => {
        if (ev.key === "Enter" && !ev.shiftKey) {
          ev.preventDefault();
          sendBtn.click();
        }
      });

      void ensureAuthed();
      syncDraftButton();
      syncPublishButton();
    </script>
  </body>
</html>
