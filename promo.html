<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#4a443f" />
    <title>了解 AskBible · AskBible.me</title>
    <link rel="icon" href="/assets/icons/icon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="/styles.css?v=23" />
  </head>
  <body>
    <!-- 版式与 download.html 相同；修改标题、各节 h2 与段落即可 -->
    <div class="page-shell">
      <header class="site-topbar">
        <div class="site-topbar-title">
          <h1>
            <a href="/" class="download-brand-link" title="返回首页"
              ><span class="brand-ask">Ask</span><span class="brand-bible">Bible</span
              ><span class="brand-me">.me</span></a
            >
          </h1>
        </div>
      </header>

      <main class="download-page">
        <div class="download-card">
          <p class="download-lead download-card-intro">
            用一两句话写出<strong>核心价值</strong>：你是谁、为谁服务、读者能在这里得到什么。
          </p>

          <section class="download-platform">
            <h2 class="download-title">我们是谁</h2>
            <p class="download-lead">
              介绍品牌或产品定位：面向哪些读者、希望解决哪些读经与灵修场景。可加入一句 slogan 或简短故事。
            </p>
          </section>

          <section class="download-platform">
            <h2 class="download-title">为什么选择我们</h2>
            <p class="download-lead">
              写 2～3 个清晰卖点（例如多译本对照、笔记本与社区、界面与体验等），语言尽量短、好扫读。
            </p>
          </section>

          <section class="download-platform">
            <h2 class="download-title">如何开始</h2>
            <p class="download-lead">
              告诉访客下一步做什么：打开读经、免费注册、或把站点添加到主屏幕以便常用。
            </p>
          </section>

          <div class="download-actions">
            <a class="primary-btn" href="/">进入读经首页</a>
            <a class="secondary-btn" href="/download.html">添加到主屏幕</a>
          </div>
        </div>
      </main>

      <footer class="site-footer">
        <span class="site-footer-copy">© 2026 AskBible.me</span>
      </footer>
    </div>
  </body>
</html>
