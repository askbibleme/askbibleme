<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#4a443f" />
    <meta
      name="description"
      content="将 AskBible.me 读经与查经网页添加到手机或平板主屏幕，像 App 一样打开，方便随时读经与小组聚会使用。"
    />
    <link rel="canonical" href="https://askbible.me/download.html" />
    <title>添加到主屏幕 · AskBible.me</title>
    <link rel="icon" href="/assets/icons/icon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="/styles.css?v=23" />
  </head>
  <body>
    <div class="page-shell">
      <header class="site-topbar">
        <div class="site-topbar-title">
          <h1>
            <a href="/" class="download-brand-link" title="返回首页"
              ><span class="brand-ask">Ask</span><span class="brand-bible">Bible</span
              ><span class="brand-me">.me</span></a
            >
          </h1>
        </div>
      </header>

      <main class="download-page">
        <div class="download-card">
          <p class="download-lead download-card-intro">
            将本站像 App 一样放在主屏幕上，打开后仍是网页版，需联网使用。
          </p>

          <section class="download-platform">
            <h2 class="download-title">iPhone / iPad</h2>
            <p class="download-lead">
              请用 <strong>Safari</strong> 打开本站，点<strong>分享</strong>按钮（地址栏旁或底栏），选<strong>添加到主屏幕</strong>，再点「添加」即可。
            </p>
          </section>

          <section class="download-platform">
            <h2 class="download-title">Android</h2>
            <p class="download-lead">
              请用 <strong>Chrome</strong>（或系统自带浏览器）打开本站，打开右上角<strong>菜单「⋮」</strong>，选择<strong>添加到主屏幕</strong>或<strong>安装应用</strong>，按提示确认即可。
            </p>
          </section>

          <div class="download-actions">
            <a class="primary-btn" href="/">返回首页</a>
          </div>
        </div>
      </main>

      <footer class="site-footer">
        <span class="site-footer-copy">© 2026 AskBible.me</span>
      </footer>
    </div>
  </body>
</html>
