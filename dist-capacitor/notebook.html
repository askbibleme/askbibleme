    <script defer src="/pwa-install-hint.js"></script>
    <script>
      const KEY = "askbible_notebook_v1";
      const FAVORITES_KEY = "bible_verse_favorites_v1";
      const QUESTION_FAVORITES_KEY = "bible_question_favorites_v1";
      const FRONT_STATE_KEY = "bible_front_state_v4";
      const FONT_SCALE_KEY = "bible_font_scale_v1";
      const VIEWPORT_SCROLL_KEY = "bible_viewport_scroll_v1";
      const PENDING_FAVORITE_FOCUS_KEY = "bible_pending_favorite_focus_v1";
      const PENDING_QUESTION_FOCUS_KEY = "bible_pending_question_focus_v1";
      const USER_AUTH_TOKEN_KEY = "bible_user_auth_token_v1";
      const BOOK_NAME_ZH = {
        GEN: "创世记", EXO: "出埃及记", LEV: "利未记", NUM: "民数记", DEU: "申命记",
        JOS: "约书亚记", JDG: "士师记", RUT: "路得记", "1SA": "撒母耳记上", "2SA": "撒母耳记下",
        "1KI": "列王纪上", "2KI": "列王纪下", "1CH": "历代志上", "2CH": "历代志下", EZR: "以斯拉记",
        NEH: "尼希米记", EST: "以斯帖记", JOB: "约伯记", PSA: "诗篇", PRO: "箴言",
        ECC: "传道书", SNG: "雅歌", ISA: "以赛亚书", JER: "耶利米书", LAM: "耶利米哀歌",
        EZK: "以西结书", DAN: "但以理书", HOS: "何西阿书", JOL: "约珥书", AMO: "阿摩司书",
        OBA: "俄巴底亚书", JON: "约拿书", MIC: "弥迦书", NAM: "那鸿书", HAB: "哈巴谷书",
        ZEP: "西番雅书", HAG: "哈该书", ZEC: "撒迦利亚书", MAL: "玛拉基书", MAT: "马太福音",
        MRK: "马可福音", LUK: "路加福音", JHN: "约翰福音", ACT: "使徒行传", ROM: "罗马书",
        "1CO": "哥林多前书", "2CO": "哥林多后书", GAL: "加拉太书", EPH: "以弗所书", PHP: "腓立比书",
        COL: "歌罗西书", "1TH": "帖撒罗尼迦前书", "2TH": "帖撒罗尼迦后书", "1TI": "提摩太前书", "2TI": "提摩太后书",
        TIT: "提多书", PHM: "腓利门书", HEB: "希伯来书", JAS: "雅各书", "1PE": "彼得前书",
        "2PE": "彼得后书", "1JN": "约翰一书", "2JN": "约翰二书", "3JN": "约翰三书", JUD: "犹大书",
        REV: "启示录"
      };
      const DEFAULT_DATA = {
        books: [
          { id: "hotVerses", title: "经文热榜", color: "olive" },
          { id: "favorites", title: "我的经文", color: "rose" },
          { id: "questionFavorites", title: "我的贡献", color: "amber" },
          { id: "divineSpeech", title: "主话摘录", color: "teal" },
          { id: "globalFavorites", title: "社区精选", color: "olive" },
        ],
        notes: {
          hotVerses: [],
          favorites: [],
          questionFavorites: [],
          globalFavorites: [],
          divineSpeech: [],
        },
      };

      const NOTEBOOK_BOOK_TITLE_MIGRATION = {
        divineSpeech: "主话摘录",
        hotVerses: "经文热榜",
        globalFavorites: "社区精选",
        favorites: "我的经文",
        questionFavorites: "我的贡献",
      };

      function loadData() {
        try {
          const parsed = JSON.parse(localStorage.getItem(KEY) || "null");
            if (parsed && parsed.books && parsed.notes) {
            let changed = false;
            for (const b of parsed.books) {
              const next = NOTEBOOK_BOOK_TITLE_MIGRATION[b.id];
              if (next && b.title !== next) {
                b.title = next;
                changed = true;
              }
            }
            const order = [
              "hotVerses",
              "favorites",
              "questionFavorites",
              "divineSpeech",
              "globalFavorites",
            ];
            const byId = new Map(parsed.books.map((b) => [b.id, b]));
            let nextBooks = order.map((id) => byId.get(id)).filter(Boolean);
            if (
              nextBooks.length === parsed.books.length &&
              parsed.books.some((b, i) => b.id !== nextBooks[i].id)
            ) {
              parsed.books = nextBooks;
              changed = true;
            } else if (nextBooks.length !== parsed.books.length || nextBooks.some((b, i) => parsed.books[i]?.id !== b.id)) {
              parsed.books = nextBooks;
              changed = true;
            }
            if (changed) saveData(parsed);
            return parsed;
          }
        } catch {}
        return DEFAULT_DATA;
      }
      function saveData(data) {
        localStorage.setItem(KEY, JSON.stringify(data));
      }

      const state = {
        data: loadData(),
        activeBookId: "divineSpeech",
      };

      const booksEl = document.getElementById("notebookBooks");
      const notesEl = document.getElementById("notebookNotes");
      const GLOBAL_SYNC_VERSE_KEYS = "bible_global_sync_verse_keys_v1";
      const GLOBAL_SYNC_QUESTION_KEYS = "bible_global_sync_question_keys_v1";

      async function fetchGlobalFavoriteItems(type) {
        try {
          const res = await fetch(
            `/api/global-favorites?type=${encodeURIComponent(type)}&limit=100`,
            { cache: "no-store" }
          );
          const data = await res.json();
          if (!res.ok) return [];
          return Array.isArray(data?.items) ? data.items : [];
        } catch {
          return [];
        }
      }

      async function fetchDivineSpeechItems(versionId) {
        try {
          const res = await fetch(
            `/api/divine-speech-verses?versionId=${encodeURIComponent(versionId || "")}&limit=500`,
            { cache: "no-store" }
          );
          const data = await res.json();
          if (!res.ok) return [];
          return Array.isArray(data?.items) ? data.items : [];
        } catch {
          return [];
        }
      }

      function getAuthToken() {
        return String(localStorage.getItem(USER_AUTH_TOKEN_KEY) || "");
      }

      function normalizeUserTotalOnlineSeconds(user) {
        if (!user || typeof user !== "object") return;
        const raw = user.totalOnlineSeconds;
        const n =
          raw === undefined || raw === null || raw === "" ? NaN : Number(raw);
        user.totalOnlineSeconds =
          Number.isFinite(n) && n >= 0
            ? Math.min(Math.floor(n), 86400 * 365 * 80)
            : 0;
      }

      async function fetchCurrentUser() {
        const token = getAuthToken();
        if (!token) return null;
        try {
          const res = await fetch("/api/auth/me", {
            headers: { Authorization: `Bearer ${token}` },
            cache: "no-store",
          });
          const data = await res.json();
          if (!res.ok) return null;
          const user = data.user || null;
          normalizeUserTotalOnlineSeconds(user);
          return user;
        } catch {
          return null;
        }
      }

      function formatNotebookOnlineTotal(sec) {
        const n = Math.max(0, Math.floor(Number(sec) || 0));
        if (n < 60) return n + " 秒";
        const m = Math.floor(n / 60);
        if (m < 60) return m + " 分钟";
        const h = Math.floor(m / 60);
        const m2 = m % 60;
        return m2 > 0 ? h + " 小时 " + m2 + " 分" : h + " 小时";
      }

      let notebookOnlinePulseId = null;
      function stopNotebookOnlinePulse() {
        if (notebookOnlinePulseId != null) {
          clearInterval(notebookOnlinePulseId);
          notebookOnlinePulseId = null;
        }
      }
      async function notebookOnlinePulseOnce() {
        const token = getAuthToken();
        if (!token) return;
        if (document.visibilityState !== "visible") return;
        try {
          const res = await fetch("/api/user/online/pulse", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              Authorization: "Bearer " + token,
            },
            body: JSON.stringify({ seconds: 45 }),
          });
          const data = await res.json().catch(() => ({}));
          if (res.ok) {
            const next = Number(data.totalOnlineSeconds);
            if (Number.isFinite(next) && next >= 0) {
              const ot = document.getElementById("notebookSettingsOnlineTotal");
              const modal = document.getElementById("notebookUserSettingsModal");
              if (ot && modal && modal.style.display === "block") {
                ot.textContent =
                  formatNotebookOnlineTotal(next) + "（登录使用期间累积）";
              }
            }
          }
        } catch (_) {}
      }
      function startNotebookOnlinePulse() {
        stopNotebookOnlinePulse();
        if (!getAuthToken()) return;
        void notebookOnlinePulseOnce();
        notebookOnlinePulseId = setInterval(() => void notebookOnlinePulseOnce(), 45000);
      }
      function initNotebookOnlinePulseClient() {
        if (document.body.dataset.notebookOnlinePulseInit === "1") return;
        document.body.dataset.notebookOnlinePulseInit = "1";
        document.addEventListener("visibilitychange", () => {
          if (document.visibilityState === "visible") void notebookOnlinePulseOnce();
        });
        startNotebookOnlinePulse();
      }

      const NOTEBOOK_SETTINGS_OPEN_FLAG = "askbible_notebook_open_settings_v1";

      async function openNotebookUserSettingsModal() {
        const modal = document.getElementById("notebookUserSettingsModal");
        const nameInput = document.getElementById("notebookSettingsNameInput");
        const emailInput = document.getElementById("notebookSettingsEmailInput");
        const statusEl = document.getElementById("notebookUserSettingsStatus");
        // 先把弹窗展示出来，避免“拿不到用户信息 -> 直接 return -> 看不到弹窗”
        if (modal) modal.style.display = "block";
        if (statusEl) statusEl.textContent = "";

        const user = await fetchCurrentUser();
        if (!user) {
          if (statusEl) statusEl.textContent = "请先在首页登录";
          return;
        }
        if (nameInput) nameInput.value = String(user.name || "");
        if (emailInput) emailInput.value = String(user.email || "");
        const ot = document.getElementById("notebookSettingsOnlineTotal");
        if (ot) {
          const ts = Math.max(0, Math.floor(Number(user.totalOnlineSeconds) || 0));
          ot.textContent =
            formatNotebookOnlineTotal(ts) + "（登录使用期间累积）";
        }
      }

      function initNotebookUserSettings() {
        const modal = document.getElementById("notebookUserSettingsModal");
        const closeBtn = document.getElementById("closeNotebookSettingsBtn");
        const saveProfileBtn = document.getElementById("saveNotebookProfileBtn");
        const savePasswordBtn = document.getElementById("saveNotebookPasswordBtn");
        const logoutBtn = document.getElementById("logoutNotebookBtn");
        const nameInput = document.getElementById("notebookSettingsNameInput");
        const emailInput = document.getElementById("notebookSettingsEmailInput");
        const currentPasswordInput = document.getElementById(
          "notebookSettingsCurrentPasswordInput"
        );
        const newPasswordInput = document.getElementById("notebookSettingsNewPasswordInput");
        const statusEl = document.getElementById("notebookUserSettingsStatus");

        closeBtn?.addEventListener("click", () => {
          if (modal) modal.style.display = "none";
        });

        saveProfileBtn?.addEventListener("click", async () => {
          const token = getAuthToken();
          const name = String(nameInput?.value || "").trim();
          const email = String(emailInput?.value || "").trim();
          if (!token) return;
          if (statusEl) statusEl.textContent = "保存中...";
          try {
            const res = await fetch("/api/auth/profile/update", {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
                Authorization: `Bearer ${token}`,
              },
              body: JSON.stringify({ name, email }),
            });
            const data = await res.json();
            if (!res.ok) throw new Error(data.error || "保存失败");
            if (statusEl) statusEl.textContent = "资料已保存";
          } catch (error) {
            if (statusEl) statusEl.textContent = error?.message || "保存失败";
          }
        });

        savePasswordBtn?.addEventListener("click", async () => {
          const token = getAuthToken();
          const currentPassword = String(currentPasswordInput?.value || "").trim();
          const newPassword = String(newPasswordInput?.value || "").trim();
          if (!token) return;
          if (statusEl) statusEl.textContent = "保存中...";
          try {
            const res = await fetch("/api/auth/password/update", {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
                Authorization: `Bearer ${token}`,
              },
              body: JSON.stringify({ currentPassword, newPassword }),
            });
            const data = await res.json();
            if (!res.ok) throw new Error(data.error || "修改失败");
            if (currentPasswordInput) currentPasswordInput.value = "";
            if (newPasswordInput) newPasswordInput.value = "";
            if (statusEl) statusEl.textContent = "密码已更新";
          } catch (error) {
            if (statusEl) statusEl.textContent = error?.message || "修改失败";
          }
        });

        logoutBtn?.addEventListener("click", async () => {
          const token = getAuthToken();
          try {
            await fetch("/api/auth/logout", {
              method: "POST",
              headers: token ? { Authorization: `Bearer ${token}` } : {},
            });
          } catch {}
          stopNotebookOnlinePulse();
          localStorage.removeItem(USER_AUTH_TOKEN_KEY);
          if (modal) modal.style.display = "none";
          const ot = document.getElementById("notebookSettingsOnlineTotal");
          if (ot) ot.textContent = "—";
          alert("已退出登录");
        });
      }

      function loadSyncedKeySet(storageKey) {
        try {
          const parsed = JSON.parse(localStorage.getItem(storageKey) || "[]");
          if (!Array.isArray(parsed)) return new Set();
          return new Set(parsed.map((x) => String(x || "")).filter(Boolean));
        } catch {
          return new Set();
        }
      }

      function saveSyncedKeySet(storageKey, setObj) {
        localStorage.setItem(storageKey, JSON.stringify(Array.from(setObj)));
      }

      async function reportGlobalFavoriteToggle(payload) {
        try {
          await fetch("/api/global-favorites/toggle", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
          });
        } catch {}
      }

      function loadFavoriteVerses() {
        try {
          const verseParsed = JSON.parse(localStorage.getItem(FAVORITES_KEY) || "[]");
          const verses = Array.isArray(verseParsed) ? verseParsed : [];
          return verses
            .slice()
            .map((x) => ({
              id: String(x.key || ""),
              key: String(x.key || ""),
              bookId: String(x.bookId || "").toUpperCase(),
              chapter: Number(x.chapter || 0),
              verse: Number(x.verse || 0),
              versionId: String(x.versionId || ""),
              createdAt: Number(x.createdAt || 0),
              title: `${BOOK_NAME_ZH[String(x.bookId || "").toUpperCase()] || String(x.bookId || "").toUpperCase()} ${Number(
                x.chapter || 0
              )}:${Number(x.verse || 0)}`,
              content: `${String(x.text || "")}`.trim(),
            }))
            .filter((x) => x.id && x.content);
        } catch {
          return [];
        }
      }

      function loadFavoriteQuestions() {
        try {
          const qParsed = JSON.parse(localStorage.getItem(QUESTION_FAVORITES_KEY) || "[]");
          const questions = Array.isArray(qParsed) ? qParsed : [];
          return questions
            .slice()
            .map((x) => ({
              id: String(x.key || ""),
              key: String(x.key || ""),
              bookId: String(x.bookId || "").toUpperCase(),
              chapter: Number(x.chapter || 0),
              createdAt: Number(x.createdAt || 0),
              title: `问题 · ${
                BOOK_NAME_ZH[String(x.bookId || "").toUpperCase()] ||
                String(x.bookId || "").toUpperCase()
              } ${Number(x.chapter || 0)}`,
              content: String(x.question || ""),
            }))
            .filter((x) => x.id && x.content);
        } catch {
          return [];
        }
      }

      function isDivineSpeechText(rawText) {
        const text = String(rawText || "").trim();
        if (!text) return false;
        const patterns = [
          /耶和华说/u, /主说/u, /神说/u, /耶稣说/u, /圣灵说/u,
          /耶和华如此说/u, /主如此说/u, /神如此说/u,
          /耶和华晓谕/u, /主晓谕/u, /神晓谕/u,
          /耶和华对.*说/u, /主对.*说/u, /神对.*说/u, /耶稣对.*说/u,
          /\bthe\s+lord\s+said\b/i, /\bgod\s+said\b/i, /\bjesus\s+said\b/i,
          /\bthus\s+says?\s+the\s+lord\b/i, /\bel\s+senor\s+dijo\b/i, /\bdios\s+dijo\b/i
        ];
        return patterns.some((re) => re.test(text));
      }

      function syncFavoritesIntoNotebook() {
        state.data.books = [
          { id: "divineSpeech", title: "主说的话", color: "teal" },
          { id: "hotVerses", title: "热门经文", color: "olive" },
          { id: "globalFavorites", title: "热门收藏", color: "olive" },
          { id: "favorites", title: "我的经文", color: "rose" },
          { id: "questionFavorites", title: "我的问题", color: "amber" },
        ];
        state.data.notes.favorites = loadFavoriteVerses();
        state.data.notes.questionFavorites = loadFavoriteQuestions();
        if (!state.data.books.some((b) => b.id === state.activeBookId)) {
          state.activeBookId = "divineSpeech";
        }
      }

      async function syncDivineSpeechIntoNotebook() {
        const currentState = JSON.parse(localStorage.getItem(FRONT_STATE_KEY) || "{}");
        const versionId = String(currentState?.primaryScriptureVersionId || "");
        const rows = await fetchDivineSpeechItems(versionId);
        state.data.notes.divineSpeech = rows.map((x) => ({
          id: String(x.key || ""),
          key: String(x.key || ""),
          type: "verse",
          bookId: String(x.bookId || "").toUpperCase(),
          chapter: Number(x.chapter || 0),
          verse: Number(x.verse || 0),
          versionId: String(x.versionId || versionId || ""),
          title: String(x.title || ""),
          content: String(x.content || ""),
        }));
      }

      async function syncGlobalFavoritesIntoNotebook() {
        const localVerses = loadFavoriteVerses();
        const localQuestions = loadFavoriteQuestions();
        let [verseHot, questionHot] = await Promise.all([
          fetchGlobalFavoriteItems("verse"),
          fetchGlobalFavoriteItems("question"),
        ]);

        if (!verseHot.length && !questionHot.length) {
          const syncedVerseKeys = loadSyncedKeySet(GLOBAL_SYNC_VERSE_KEYS);
          const syncedQuestionKeys = loadSyncedKeySet(GLOBAL_SYNC_QUESTION_KEYS);
          let verseChanged = false;
          let questionChanged = false;

          for (const item of localVerses) {
            const key = String(item.key || "");
            if (!key || syncedVerseKeys.has(key)) continue;
            syncedVerseKeys.add(key);
            verseChanged = true;
            await reportGlobalFavoriteToggle({
              action: "add",
              type: "verse",
              key,
              bookId: item.bookId,
              chapter: Number(item.chapter || 0),
              verse: Number(item.verse || 0),
              title: String(item.title || ""),
              content: String(item.content || ""),
            });
          }

          for (const item of localQuestions) {
            const key = String(item.key || "");
            if (!key || syncedQuestionKeys.has(key)) continue;
            syncedQuestionKeys.add(key);
            questionChanged = true;
            await reportGlobalFavoriteToggle({
              action: "add",
              type: "question",
              key,
              bookId: item.bookId,
              chapter: Number(item.chapter || 0),
              title: String(item.title || ""),
              content: String(item.content || ""),
            });
          }

          if (verseChanged) saveSyncedKeySet(GLOBAL_SYNC_VERSE_KEYS, syncedVerseKeys);
          if (questionChanged) saveSyncedKeySet(GLOBAL_SYNC_QUESTION_KEYS, syncedQuestionKeys);

          [verseHot, questionHot] = await Promise.all([
            fetchGlobalFavoriteItems("verse"),
            fetchGlobalFavoriteItems("question"),
          ]);
        }

        if (!verseHot.length && !questionHot.length) {
          verseHot = localVerses.map((x) => ({
            key: x.key,
            type: "verse",
            bookId: x.bookId,
            chapter: x.chapter,
            verse: x.verse,
            title: x.title,
            content: x.content,
            count: 1,
            updatedAt: new Date().toISOString(),
          }));
          questionHot = localQuestions.map((x) => ({
            key: x.key,
            type: "question",
            bookId: x.bookId,
            chapter: x.chapter,
            title: x.title,
            content: x.content,
            count: 1,
            updatedAt: new Date().toISOString(),
          }));
        }

        const verseItems = verseHot.map((x) => ({
          id: String(x.key || ""),
          key: String(x.key || ""),
          type: "verse",
          bookId: String(x.bookId || "").toUpperCase(),
          chapter: Number(x.chapter || 0),
          verse: Number(x.verse || 0),
          versionId: "",
          createdAt: Number(new Date(String(x.updatedAt || Date.now())).getTime()),
          title:
            String(x.title || "") ||
            `${BOOK_NAME_ZH[String(x.bookId || "").toUpperCase()] || String(x.bookId || "")} ${Number(
              x.chapter || 0
            )}:${Number(x.verse || 0)}`,
          content: String(x.content || ""),
          count: Number(x.count || 0),
        }));

        const questionItems = questionHot.map((x) => ({
          id: String(x.key || ""),
          key: String(x.key || ""),
          type: "question",
          bookId: String(x.bookId || "").toUpperCase(),
          chapter: Number(x.chapter || 0),
          createdAt: Number(new Date(String(x.updatedAt || Date.now())).getTime()),
          title:
            String(x.title || "") ||
            `问题 · ${BOOK_NAME_ZH[String(x.bookId || "").toUpperCase()] || String(x.bookId || "")} ${Number(
              x.chapter || 0
            )}`,
          content: String(x.content || ""),
          count: Number(x.count || 0),
        }));

        state.data.notes.globalFavorites = [...verseItems, ...questionItems].sort(
          (a, b) => Number(b.count || 0) - Number(a.count || 0)
        );
        state.data.notes.hotVerses = verseItems.sort(
          (a, b) => Number(b.count || 0) - Number(a.count || 0)
        );
      }

      function getActiveBook() {
        return state.data.books.find((b) => b.id === state.activeBookId) || state.data.books[0];
      }
      function getActiveNotes() {
        return state.data.notes[state.activeBookId] || [];
      }

      function renderBooks() {
        booksEl.innerHTML = state.data.books
          .map((b) => {
            const active = b.id === state.activeBookId ? "active" : "";
            return `<button type="button" class="notebook-item ${active}" data-book-id="${b.id}" role="tab" aria-selected="${active ? "true" : "false"}"><span class="notebook-color-dot ${b.color}" aria-hidden="true"></span>${b.title}</button>`;
          })
          .join("");
        booksEl.querySelectorAll("[data-book-id]").forEach((btn) => {
          btn.addEventListener("click", () => {
            const nextBookId = btn.getAttribute("data-book-id");
            state.activeBookId = nextBookId;
            renderAll();
          });
        });
      }

      function renderNotes() {
        const list = getActiveNotes();
        if (!list.length) {
          notesEl.innerHTML = `<div class="empty-state">${
            state.activeBookId === "questionFavorites"
              ? "暂无我的问题"
              : state.activeBookId === "hotVerses"
              ? "暂无热门经文"
              : state.activeBookId === "divineSpeech"
              ? "暂无主说的话"
              : state.activeBookId === "globalFavorites"
              ? "暂无热门收藏"
              : state.activeBookId === "favorites"
              ? "暂无我的经文"
              : "暂无内容"
          }</div>`;
          return;
        }
        notesEl.innerHTML = list
          .map((n, idx) => {
            if (n.type === "article") {
              const title = String(n.title || "").replaceAll("<", "&lt;").replaceAll(">", "&gt;");
              const body = String(n.content || "").replaceAll("<", "&lt;").replaceAll(">", "&gt;");
              const by = String(n.authorName || "").trim();
              const byline = by ? `<p class="notebook-article-byline">${by.replaceAll("<", "&lt;")}</p>` : "";
              return `<article class="notebook-note-card is-article-card" data-article="1">
                <h3 class="notebook-article-heading"><span class="notebook-note-rank">${idx + 1}.</span>${title}</h3>
                ${byline}
                <div class="notebook-note-content">${body}</div>
              </article>`;
            }
            const isVerseItem =
              state.activeBookId === "divineSpeech" ||
              state.activeBookId === "hotVerses" ||
              state.activeBookId === "favorites" ||
              (state.activeBookId === "globalFavorites" && n.type === "verse");
            const divineClass =
              isVerseItem && isDivineSpeechText(n.content || "") ? " is-divine-speech-note" : "";
            return `<article class="notebook-note-card">
              <div class="notebook-note-content${divineClass}"><span class="notebook-note-rank">${idx + 1}.</span>${(n.content || "")
                .replaceAll("<", "&lt;")
                .replaceAll(">", "&gt;")} <span class="notebook-note-source">${n.title}</span></div>
            </article>`;
          })
          .join("");

        notesEl.querySelectorAll(".notebook-note-card").forEach((card, idx) => {
          card.addEventListener("click", () => {
            const item = list[idx];
            if (!item) return;
            if (card.getAttribute("data-article") === "1" || item.type === "article") {
              return;
            }
            const currentState = JSON.parse(localStorage.getItem(FRONT_STATE_KEY) || "{}");
            const nextState = {
              ...currentState,
              bookId: item.bookId,
              chapter: item.chapter,
            };
            if (item.versionId) {
              nextState.primaryScriptureVersionId = item.versionId;
              nextState.secondaryScriptureVersionIds = (
                nextState.secondaryScriptureVersionIds || []
              ).filter((id) => id !== item.versionId);
            }
            localStorage.setItem(FRONT_STATE_KEY, JSON.stringify(nextState));
            if (
              state.activeBookId === "questionFavorites" ||
              (state.activeBookId === "globalFavorites" && item.type === "question")
            ) {
              localStorage.setItem(PENDING_QUESTION_FOCUS_KEY, item.key || "");
            } else {
              localStorage.setItem(PENDING_FAVORITE_FOCUS_KEY, item.key || "");
            }
            localStorage.setItem(VIEWPORT_SCROLL_KEY, "0");
            window.location.href = "/";
          });
        });
      }

      async function renderAll() {
        syncFavoritesIntoNotebook();
        await syncGlobalFavoritesIntoNotebook();
        await syncDivineSpeechIntoNotebook();
        renderBooks();
        renderNotes();
      }

      initNotebookUserSettings();
      initNotebookOnlinePulseClient();

      function readNotebookSettingsIntentFromLocation() {
        let fromHash = false;
        let fromQuery = false;
        try {
          const raw = String(window.location.hash || "").replace(/^#/, "").trim();
          const key = decodeURIComponent(raw.split(/[?&]/)[0] || "")
            .trim()
            .toLowerCase();
          if (key === "settings" || key === "profile") fromHash = true;
        } catch (_) {}
        try {
          const sp = new URLSearchParams(window.location.search || "");
          if (
            sp.get("openSettings") === "1" ||
            sp.get("settings") === "1" ||
            sp.get("profile") === "1"
          ) {
            fromQuery = true;
          }
        } catch (_) {}
        return { fromHash, fromQuery };
      }

      function stripNotebookSettingsFromUrl() {
        try {
          const url = new URL(window.location.href);
          url.hash = "";
          url.searchParams.delete("openSettings");
          url.searchParams.delete("settings");
          url.searchParams.delete("profile");
          const qs = url.searchParams.toString();
          history.replaceState(
            null,
            "",
            url.pathname + (qs ? `?${qs}` : "")
          );
        } catch (_) {}
      }

      async function tryOpenNotebookSettingsDeeplink() {
        const { fromHash, fromQuery } = readNotebookSettingsIntentFromLocation();
        let fromStorage = false;
        try {
          fromStorage =
            sessionStorage.getItem(NOTEBOOK_SETTINGS_OPEN_FLAG) === "1" ||
            localStorage.getItem(NOTEBOOK_SETTINGS_OPEN_FLAG) === "1";
        } catch (_) {}
        if (!fromHash && !fromQuery && !fromStorage) return;
        try {
          sessionStorage.removeItem(NOTEBOOK_SETTINGS_OPEN_FLAG);
          localStorage.removeItem(NOTEBOOK_SETTINGS_OPEN_FLAG);
        } catch (_) {}
        if (fromHash || fromQuery) {
          stripNotebookSettingsFromUrl();
        }
        await openNotebookUserSettingsModal();
      }

      window.addEventListener("hashchange", () => {
        void tryOpenNotebookSettingsDeeplink();
      });
      window.addEventListener("load", () => {
        void tryOpenNotebookSettingsDeeplink();
      });
      window.addEventListener("pageshow", () => {
        void tryOpenNotebookSettingsDeeplink();
      });
      void tryOpenNotebookSettingsDeeplink();
      requestAnimationFrame(() => {
        void tryOpenNotebookSettingsDeeplink();
      });
      setTimeout(() => void tryOpenNotebookSettingsDeeplink(), 0);
      setTimeout(() => void tryOpenNotebookSettingsDeeplink(), 150);
      setTimeout(() => void tryOpenNotebookSettingsDeeplink(), 500);

      renderAll();
    </script>
    <script>
      (function () {
        var host = location.hostname;
        if (host !== "localhost" && host !== "127.0.0.1") return;
        if (String(location.port || "") !== "3000") return;
        var s = document.createElement("script");
        s.src = "http://" + host + ":35729/livereload.js?snipver=1";
        s.async = true;
        s.onerror = function () {};
        document.body.appendChild(s);
      })();
    </script>
  </body>
