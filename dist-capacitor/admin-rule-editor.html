<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#4a443f" />
    <meta name="askbible-api-base" content="" />
    <title>管理后台 · 规则编辑</title>
    <link rel="icon" href="/assets/icons/icon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="/styles.css?v=110" />
    <link rel="stylesheet" href="/admin-shell.css?v=12" />
    <style>
      .admin-rule-page {
        max-width: 1200px;
        margin: 0 auto;
      }
      .admin-rule-shell {
        border: 1px solid rgba(74, 68, 63, 0.12);
        border-radius: 18px;
        background:
          radial-gradient(1200px 300px at 10% -120px, rgba(255, 184, 46, 0.1), transparent 60%),
          linear-gradient(180deg, #fffefc 0%, #ffffff 100%);
        box-shadow:
          0 10px 28px rgba(74, 68, 63, 0.08),
          0 1px 0 rgba(255, 255, 255, 0.7) inset;
        padding: 20px 18px 18px;
      }
      .admin-rule-heading {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 12px;
      }
      .admin-rule-heading h1 {
        margin: 0 0 8px;
        font-size: calc(28px * var(--font-scale));
        color: var(--ink);
        letter-spacing: -0.02em;
      }
      .admin-rule-heading p {
        margin: 0;
        max-width: 54em;
        color: var(--muted-soft);
        line-height: 1.65;
      }
      .admin-rule-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }
      .admin-rule-btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 42px;
        padding: 0 14px;
        border-radius: 12px;
        border: 1px solid var(--line);
        background: linear-gradient(180deg, #ffffff 0%, #f9f5ee 100%);
        color: var(--ink);
        text-decoration: none;
        font-weight: 800;
      }
      .admin-rule-btn--primary {
        border-color: rgba(166, 126, 22, 0.38);
        background: linear-gradient(180deg, #d8b12f 0%, #b68f16 100%);
        color: #fffaf0;
      }
      .admin-rule-meta {
        margin: 0 0 14px;
        padding: 10px 12px;
        border-radius: 12px;
        border: 1px solid rgba(214, 203, 187, 0.72);
        background: rgba(255, 251, 242, 0.92);
        color: rgba(74, 68, 63, 0.82);
        font-size: 13px;
        line-height: 1.6;
      }
      .admin-rule-frame {
        width: 100%;
        min-height: calc(100vh - 270px);
        border: 1px solid rgba(214, 203, 187, 0.72);
        border-radius: 14px;
        background: #fff;
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.8);
      }
      @media (max-width: 860px) {
        .admin-rule-heading {
          flex-direction: column;
        }
        .admin-rule-frame {
          min-height: 78vh;
        }
      }
    </style>
  </head>
  <body class="admin-shell-page" data-admin-current="/admin-rule-editor.html">
    <main class="admin-rule-page">
      <section class="admin-rule-shell">
        <div class="admin-rule-heading">
          <div>
            <h1>规则编辑</h1>
            <p>
              这是统一管理后台下的独立规则工作台。当前先承接你现有的规则编辑能力，后续再逐步把版本选择、规则编辑器和保存反馈完全页内化。
            </p>
          </div>
          <div class="admin-rule-actions">
            <a class="admin-rule-btn" href="/admin-hub.html">返回管理首页</a>
            <a class="admin-rule-btn admin-rule-btn--primary" href="/#openAdmin:ruleEditor">打开原规则视图</a>
          </div>
        </div>
        <p class="admin-rule-meta">
          说明：当前这个独立页已经成为统一入口，内部先复用原来的规则编辑工作台，确保现有编辑流程不受影响；后续可以把规则版本、编辑器和预览拆成原生后台模块。
        </p>
        <iframe
          class="admin-rule-frame"
          src="/#openAdmin:ruleEditor"
          title="规则编辑工作台"
          loading="eager"
          referrerpolicy="same-origin"
        ></iframe>
      </section>
    </main>
    <script src="/admin-shell.js?v=6" defer></script>
  </body>
</html>
