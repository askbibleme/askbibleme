<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#f5f5f7" />
    <meta
      name="description"
      content="AskBible.me：以问题陪伴读经，让经文自己发声。在线查经与读经平台，适合个人灵修与小组聚会前的经文预备。"
    />
    <link rel="canonical" href="https://askbible.me/promo.html" />
    <title>让经文自己发声 · AskBible.me</title>
    <link rel="icon" href="/assets/icons/icon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="/styles.css?v=73" />
    <link rel="stylesheet" href="/promo.css?v=2" />
  </head>
  <body class="promo-page-body">
    <div class="page-shell promo-shell">
      <header class="site-topbar">
        <div class="site-topbar-title">
          <a
            href="/"
            class="download-brand-link"
            title="返回首页"
            aria-label="AskBible.me 首页"
            ><span class="brand-ask">Ask</span><span class="brand-bible">Bible</span
            ><span class="brand-me">.me</span></a
          >
        </div>
      </header>

      <main class="promo-main">
        <section class="promo-hero-panel" aria-labelledby="promo-headline">
          <div class="promo-hero-content">
            <p class="promo-eyebrow">AskBible.me</p>
            <h1 id="promo-headline" class="promo-headline">让经文自己发声</h1>
            <p class="promo-tagline-en">
              Guided by questions.<br />
              Let Scripture speak.
            </p>
          </div>
        </section>

        <div class="promo-feed">
          <p id="promoMarkdownStatus" class="promo-md-status" aria-live="polite">加载正文…</p>
          <div id="promoMarkdownMount" class="promo-md-root" hidden></div>
          <p id="promoMarkdownError" class="promo-md-error" hidden></p>
        </div>

        <div class="promo-closing">
          <div class="promo-closing-card">
            <p class="promo-footer-brand">AskBible.me</p>
            <p class="promo-footer-line">Guided by questions. Let Scripture speak.</p>
          </div>
        </div>

        <div class="download-actions promo-actions">
          <a class="primary-btn" href="/">进入读经首页</a>
          <a class="secondary-btn" href="/download.html">添加到主屏幕</a>
          <a class="secondary-btn" href="/vision.html">Vision 理念页</a>
        </div>
      </main>

      <footer class="site-footer">
        <span class="site-footer-copy">© 2026 AskBible.me</span>
      </footer>
    </div>
  
    <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>
    <script>
(function () {
  const mount = document.getElementById('promoMarkdownMount');
  const errEl = document.getElementById('promoMarkdownError');
  const statusEl = document.getElementById('promoMarkdownStatus');
  function showErr(msg) {
    if (statusEl) statusEl.hidden = true;
    if (mount) mount.hidden = true;
    if (errEl) {
      errEl.hidden = false;
      errEl.textContent = msg;
    }
  }
  function purifyHtml(html) {
    if (typeof DOMPurify === 'undefined') return '';
    return DOMPurify.sanitize(html, {
      ALLOWED_TAGS: [
        'h1','h2','h3','h4','h5','h6','p','br','ul','ol','li','strong','em','b','i','u',
        'a','blockquote','pre','code','hr','table','thead','tbody','tr','th','td','span','div','img'
      ],
      ALLOWED_ATTR: ['href','title','target','rel','class','id','src','alt','loading'],
      ADD_ATTR: ['target'],
    });
  }
  function afterSanitize(root) {
    if (!root) return;
    root.querySelectorAll('a[href]').forEach(function (a) {
      const href = a.getAttribute('href') || '';
      if (/^https?:\/\//i.test(href)) {
        a.setAttribute('target', '_blank');
        a.setAttribute('rel', 'noopener noreferrer');
      }
    });
  }
  async function run() {
    if (typeof marked === 'undefined' || typeof DOMPurify === 'undefined') {
      showErr('无法加载排版组件，请检查网络后刷新。');
      return;
    }
    marked.setOptions({ gfm: true, breaks: true, headerIds: true, mangle: false });
    let md = '';
    try {
      const res = await fetch(
        '/api/promo-page?t=' + encodeURIComponent(String(Date.now())),
        { cache: 'no-store' }
      );
      const data = await res.json().catch(function () { return {}; });
      if (!res.ok) throw new Error((data && data.error) || ('HTTP ' + res.status));
      md = String((data && data.markdown) || '');
    } catch (e) {
      showErr('加载宣传正文失败：' + (e && e.message ? e.message : String(e)));
      return;
    }
    if (!md.trim()) {
      showErr('宣传正文为空。请管理员在「宣传页 Markdown」中编辑并发布。');
      return;
    }
    let raw;
    try {
      raw = marked.parse(md);
    } catch (e) {
      showErr('Markdown 解析失败：' + (e && e.message ? e.message : String(e)));
      return;
    }
    const clean = purifyHtml(raw);
    mount.innerHTML = clean;
    afterSanitize(mount);
    wrapSections(mount);
    if (statusEl) statusEl.hidden = true;
    mount.hidden = false;
  }
  /** 每个 h2 与后续内容包成一张卡片，直到下一个 h2 或 .promo-kicker */
  function wrapSections(root) {
    const nodes = Array.from(root.childNodes);
    const frag = document.createDocumentFragment();
    let buf = [];
    function flush() {
      if (!buf.length) return;
      const art = document.createElement('article');
      art.className = 'promo-block';
      buf.forEach(function (n) { art.appendChild(n); });
      frag.appendChild(art);
      buf = [];
    }
    nodes.forEach(function (n) {
      if (n.nodeType !== 1) {
        if (n.textContent && n.textContent.trim()) buf.push(n);
        return;
      }
      const el = n;
      if (el.classList && el.classList.contains('promo-kicker')) {
        flush();
        frag.appendChild(el);
        return;
      }
      if (/^H2$/i.test(el.tagName)) {
        flush();
        buf.push(el);
        return;
      }
      buf.push(el);
    });
    flush();
    root.textContent = '';
    root.appendChild(frag);
  }
  run();
})();
    </script>

  </body>
</html>
