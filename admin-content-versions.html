<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#4a443f" />
    <meta name="askbible-api-base" content="" />
    <title>管理后台 · 内容版本</title>
    <link rel="icon" href="/assets/icons/icon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="/styles.css?v=110" />
    <link rel="stylesheet" href="/admin-shell.css?v=12" />
    <style>
      .admin-workbench-page { max-width: 1200px; margin: 0 auto; }
      .admin-workbench-shell { border: 1px solid rgba(74,68,63,.12); border-radius:18px; background: radial-gradient(1200px 300px at 10% -120px, rgba(255,184,46,.1), transparent 60%), linear-gradient(180deg,#fffefc 0%,#ffffff 100%); box-shadow:0 10px 28px rgba(74,68,63,.08), 0 1px 0 rgba(255,255,255,.7) inset; padding:20px 18px 18px; }
      .admin-workbench-heading { display:flex; align-items:flex-start; justify-content:space-between; gap:12px; margin-bottom:12px; }
      .admin-workbench-heading h1 { margin:0 0 8px; font-size:calc(28px * var(--font-scale)); color:var(--ink); letter-spacing:-0.02em; }
      .admin-workbench-heading p { margin:0; max-width:54em; color:var(--muted-soft); line-height:1.65; }
      .admin-workbench-actions { display:flex; flex-wrap:wrap; gap:10px; }
      .admin-workbench-btn { display:inline-flex; align-items:center; justify-content:center; min-height:42px; padding:0 14px; border-radius:12px; border:1px solid var(--line); background:linear-gradient(180deg,#ffffff 0%,#f9f5ee 100%); color:var(--ink); text-decoration:none; font-weight:800; }
      .admin-workbench-btn--primary { border-color:rgba(166,126,22,.38); background:linear-gradient(180deg,#d8b12f 0%,#b68f16 100%); color:#fffaf0; }
      .admin-workbench-meta { margin:0 0 14px; padding:10px 12px; border-radius:12px; border:1px solid rgba(214,203,187,.72); background:rgba(255,251,242,.92); color:rgba(74,68,63,.82); font-size:13px; line-height:1.6; }
      .admin-workbench-frame { width:100%; min-height:calc(100vh - 270px); border:1px solid rgba(214,203,187,.72); border-radius:14px; background:#fff; box-shadow:inset 0 1px 0 rgba(255,255,255,.8); }
      @media (max-width:860px) { .admin-workbench-heading { flex-direction:column; } .admin-workbench-frame { min-height:78vh; } }
    </style>
  </head>
  <body class="admin-shell-page" data-admin-current="/admin-content-versions.html">
    <main class="admin-workbench-page">
      <section class="admin-workbench-shell">
        <div class="admin-workbench-heading">
          <div>
            <h1>内容版本</h1>
            <p>统一后台下的独立内容版本工作台。当前先承接现有内容版本管理能力，后续再把版本列表、显示策略与保存反馈完全页内化。</p>
          </div>
          <div class="admin-workbench-actions">
            <a class="admin-workbench-btn" href="/admin-hub.html">返回管理首页</a>
            <a class="admin-workbench-btn admin-workbench-btn--primary" href="/#openAdmin:content_versions_menu">打开原内容版本视图</a>
          </div>
        </div>
        <p class="admin-workbench-meta">当前这个独立页已经成为统一入口，内部先复用原来的内容版本工作台，确保现有流程不受影响。</p>
        <iframe class="admin-workbench-frame" src="/#openAdmin:content_versions_menu" title="内容版本工作台" loading="eager" referrerpolicy="same-origin"></iframe>
      </section>
    </main>
    <script src="/admin-shell.js?v=6" defer></script>
  </body>
</html>
